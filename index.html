                            <div><div style={{ fontWeight:'bold', fontSize:'14px', color:'#86efac' }}>{c.name}</div><div style={{ fontSize:'10px', color:'#9ca3af' }}>Full Heal + Potion</div></div>
                            <button onClick={()=>buyItem('consumable', c)} disabled={player.gold < c.cost} className="pixel-btn" style={{ backgroundColor:'#6b21a8', color:'white', fontSize:'10px', padding:'4px 8px', cursor:'pointer' }}>{c.cost}G</button>
                          </div>
                        ))}
                      </div>
                    </div>
                    <button onClick={() => setGameState('EXPLORE')} className="pixel-btn" style={{ backgroundColor:'#475569', color:'white', fontSize:'12px', width:'100%', maxWidth:'200px', margin:'16px auto 0 auto', cursor:'pointer' }}>Leave</button>
                  </div>
                )}

                {/* COMBAT VIEW */}
                {gameState === 'COMBAT' && currentEnemy && (
                  <div style={{ width:'100%', height:'100%', display:'flex', flexDirection:'column', backgroundColor:'#000', fontFamily:'sans-serif', position:'relative' }}>
                    
                    {/* Top Status Bar (Hero) */}
                    <div style={{ backgroundColor:'#1d4ed8', color:'white', padding:'12px', display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'3px solid white', zIndex:10, flexShrink:0 }}>
                      <div>
                          <h2 style={{ fontSize:'1.2rem', fontWeight:'900', fontStyle:'italic', color:'#fde047' }}>{player.name}</h2>
                          <p style={{ fontSize:'12px', fontWeight:'bold', color:'#bfdbfe' }}>Lv {player.level} | {player.charClass}</p>
                      </div>
                      <div style={{ textAlign:'right' }}>
                          <p style={{ fontSize:'14px', fontWeight:'900', color:'#fca5a5' }}>HP: {player.hp}/{player.maxHp}</p>
                          <div style={{ width:'120px', height:'10px', backgroundColor:'#1e293b', border:'2px solid black', borderRadius:'999px', overflow:'hidden', display:'inline-block', marginTop:'4px' }}>
                            <div style={{ height:'100%', backgroundColor:'#22c55e', transition:'width 0.3s', width: `${(player.hp/player.maxHp)*100}%` }} />
                          </div>
                      </div>
                    </div>

                    {/* Arena */}
                    <div style={{ flex:1, position:'relative', padding:'16px', display:'flex', flexDirection:'column', justifyContent:'center', alignItems:'center', overflow:'hidden' }}>
                       {/* Enemy HP Box */}
                       <div className="animate-slide-in-left" style={{ position:'absolute', top:'16px', left:'16px', backgroundColor:'white', border:'2px solid black', padding:'8px', borderRadius:'4px', boxShadow:'4px 4px 0 rgba(0,0,0,0.5)', minWidth:'120px', zIndex:10 }}>
                          <h3 style={{ fontWeight:'900', fontSize:'14px', textTransform:'uppercase', color: getDifficultyColor(currentEnemy, player) }}>Wild {currentEnemy.name}</h3>
                          <div style={{ width:'100%', height:'8px', backgroundColor:'#d1d5db', border:'1px solid black', borderRadius:'999px', marginTop:'4px', overflow:'hidden' }}>
                             <div style={{ height:'100%', backgroundColor:'#ef4444', transition:'width 0.3s', width: `${(currentEnemy.hp/currentEnemy.maxHp)*100}%` }} />
                          </div>
                       </div>

                       {/* Enemy Sprite */}
                       <div className={`${enemyVfx==='vfx-faint-flash'?'vfx-faint-flash':''} ${currentEnemy.isDead ? 'vfx-death' : ''}`} style={{ position:'relative', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'min(20vh, 160px)', filter:'drop-shadow(0 20px 20px rgba(0,0,0,0.4))' }}>
                          {currentEnemy.icon}
                          {overlayVfx === 'attack' && <div className="vfx-pop" style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', zIndex:50, fontSize:'5rem', filter:'drop-shadow(2px 2px 2px rgba(0,0,0,0.3))' }}>💥</div>}
                          {overlayVfx === 'ultimate' && <div className="vfx-ult" style={{ position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', zIndex:50, fontSize:'7rem', filter:'drop-shadow(2px 2px 2px rgba(0,0,0,0.5))' }}>🌀</div>}
                       </div>
                    </div>

                    {/* Bottom Action Menu */}
                    <div style={{ backgroundColor:'white', borderTop:'3px solid white', padding:'16px', minHeight:'160px', position:'relative', zIndex:20, flexShrink:0, boxShadow:'inset 0 8px 0 rgba(0,0,0,0.1)' }}>
                       {!showQuiz ? (
                          <div style={{ height:'100%', display:'flex', flexDirection:'column', justifyContent:'center' }}>
                             {isActionLocked ? (
                                <p style={{ color:'black', fontWeight:'900', fontSize:'1.2rem', textAlign:'center' }}>
                                   A wild {currentEnemy.name} appeared! ...
                                </p>
                             ) : (
                                <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px', width:'100%', maxWidth:'400px', margin:'0 auto' }}>
                                   <button onClick={() => { setQuizType('ATTACK'); triggerScienceChallenge(); }} style={{ backgroundColor:'#dc2626', color:'white', fontWeight:'900', textTransform:'uppercase', fontSize:'12px', padding:'12px', border:'2px solid black', cursor:'pointer', boxShadow:'4px 4px 0 black' }}>ATTACK</button>
                                   <button onClick={() => { setQuizType('ULTIMATE_1'); setUltAnswers([]); triggerScienceChallenge(true); }} disabled={player.ultCooldown > 0} style={{ backgroundColor:'#7e22ce', color:'white', fontWeight:'900', fontSize:'12px', padding:'12px', border:'2px solid black', cursor: player.ultCooldown > 0 ? 'not-allowed' : 'pointer', boxShadow:'4px 4px 0 black', opacity: player.ultCooldown > 0 ? 0.5 : 1 }}>
                                      ULTIMATE {player.ultCooldown > 0 ? `(CD: ${player.ultCooldown})` : ''}
                                   </button>
                                   <button onClick={()=>executeCombatAction('POTION')} disabled={player.potions<=0} style={{ backgroundColor:'#ec4899', color:'white', fontWeight:'900', textTransform:'uppercase', fontSize:'12px', padding:'12px', border:'2px solid black', cursor: player.potions<=0 ? 'not-allowed' : 'pointer', boxShadow:'4px 4px 0 black', opacity: player.potions<=0 ? 0.5 : 1 }}>POTION ({player.potions})</button>
                                   <button onClick={()=>executeCombatAction('FLEE')} disabled={currentEnemy.isBoss} style={{ backgroundColor:'#475569', color:'white', fontWeight:'900', textTransform:'uppercase', fontSize:'12px', padding:'12px', border:'2px solid black', cursor: currentEnemy.isBoss ? 'not-allowed' : 'pointer', boxShadow:'4px 4px 0 black', opacity: currentEnemy.isBoss ? 0.5 : 1 }}>FLEE</button>
                                </div>
                             )}
                          </div>
                       ) : (
                           <div className="scrollable custom-scroll" style={{ width:'100%', display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'flex-start', height:'100%', maxHeight:'30vh' }}>
                               <div style={{ fontSize:'14px', fontFamily:'monospace', fontWeight:'bold', color:'white', marginBottom:'16px', backgroundColor:'#0f172a', padding:'16px', border:'2px solid white', textAlign:'left', width:'100%', boxShadow:'inset 0 0 8px rgba(0,0,0,0.5)', borderRadius:'4px', whiteSpace:'pre-wrap', flexShrink:0 }}>
                                 {quizProblem.q}
                               </div>
                               <div style={{ display:'grid', gridTemplateColumns:'1fr', gap:'8px', width:'100%' }}>
                                  {quizProblem.options?.map(opt => (
                                     <button key={opt} onClick={() => handleQuizAnswer(opt)} style={{ backgroundColor:'#e2e8f0', color:'#0f172a', border:'2px solid #1e3a8a', fontWeight:'bold', fontSize:'12px', padding:'12px', boxShadow:'2px 2px 0 #1e3a8a', cursor:'pointer', textAlign:'left' }}>
                                       {opt}
                                     </button>
                                  ))}
                               </div>
                           </div>
                       )}
                    </div>
                  </div>
                )}
              </div>

              {/* RIGHT SIDEBAR: UI Elements exactly as the image */}
              <div className="game-sidebar">
                
                {/* 1. Top Action Buttons */}
                <div style={{ display:'flex', gap:'8px', flexShrink:0 }}>
                  <button onClick={() => setActiveMenu('INVENTORY')} className="pixel-font" style={{ flex:1, backgroundColor:'#9333ea', color:'white', border:'2px solid white', padding:'8px 4px', fontSize:'10px', display:'flex', alignItems:'center', justifyContent:'center', gap:'4px', cursor:'pointer' }}>
                    <span style={{color:'#f472b6'}}>🎒</span> MENU
                  </button>
                  <button onClick={saveGame} className="pixel-font" style={{ flex:1, backgroundColor:'#2563eb', color:'white', border:'2px solid white', padding:'8px 4px', fontSize:'10px', display:'flex', alignItems:'center', justifyContent:'center', gap:'4px', cursor:'pointer' }}>
                    <span style={{color:'#fca5a5'}}>💾</span> SAVE
                  </button>
                  <div className="pixel-font" style={{ flex:1, backgroundColor:'black', color:'#fde047', border:'2px solid #475569', padding:'8px 4px', fontSize:'10px', display:'flex', alignItems:'center', justifyContent:'center', gap:'4px' }}>
                    <span>⏱️</span> {(() => {
                      const playTimeSeconds = Math.floor((Date.now() - (player.startTime || Date.now())) / 1000);
                      const mins = Math.floor(playTimeSeconds / 60);
                      const secs = playTimeSeconds % 60;
                      return `${mins}m ${secs}s`;
                    })()}
                  </div>
                </div>

                {/* 2. Stats Panel */}
                <div className={`ui-panel ${screenVfx==='flash-green'?'flash-green-panel':''}`} style={{ backgroundColor:'#0f172a', padding:'16px', flexShrink:0, transition:'box-shadow 0.3s' }}>
                  {/* Header */}
                  <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', borderBottom:'2px solid #1e3a8a', paddingBottom:'8px', marginBottom:'16px' }}>
                    <h3 className="pixel-font" style={{ fontSize:'16px', color:'#fde047', textTransform:'uppercase', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis' }}>{player.name}</h3>
                    <span className="pixel-font" style={{ fontSize:'12px' }}>LV {player.level}</span>
                  </div>
                  
                  {/* Bars */}
                  <div style={{ marginBottom:'12px' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', fontSize:'12px', fontWeight:'bold', fontFamily:'sans-serif', marginBottom:'4px' }}><span>HP</span> <span>{player.hp}/{player.maxHp}</span></div>
                    <div style={{ width:'100%', backgroundColor:'#1e293b', height:'12px' }}>
                      <div style={{ backgroundColor:'#ef4444', height:'100%', transition:'width 0.3s', width: `${(player.hp/player.maxHp)*100}%` }}></div>
                    </div>
                  </div>
                  
                  <div style={{ marginBottom:'20px' }}>
                    <div style={{ display:'flex', justifyContent:'space-between', fontSize:'12px', fontWeight:'bold', fontFamily:'sans-serif', marginBottom:'4px' }}><span>EXP</span> <span>{player.exp}/{EXP_REQUIREMENTS[player.level] || (player.level*1000)}</span></div>
                    <div style={{ width:'100%', backgroundColor:'#1e293b', height:'12px' }}>
                      <div style={{ backgroundColor:'#000', height:'100%', transition:'width 0.3s', width: `${(player.exp/(EXP_REQUIREMENTS[player.level] || (player.level*1000)))*100}%` }}></div>
                    </div>
                  </div>

                  {/* Stats Grid */}
                  <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'12px', backgroundColor:'#1e293b', padding:'12px', fontSize:'14px', fontWeight:'bold', fontFamily:'sans-serif', marginBottom:'16px' }}>
                    <div style={{ display:'flex', alignItems:'center', gap:'8px' }}><span style={{color:'#9ca3af'}}>⚔️</span> {player.atk} {player.weapon && <span style={{color:'#4ade80', fontSize:'10px'}}>(+{player.weapon.atk})</span>}</div>
                    <div style={{ display:'flex', alignItems:'center', gap:'8px' }}><span style={{color:'#9ca3af'}}>🛡️</span> {player.def} {player.armor && <span style={{color:'#60a5fa', fontSize:'10px'}}>(+{player.armor.def})</span>}</div>
                    <div style={{ display:'flex', alignItems:'center', gap:'8px' }}><span style={{color:'#f472b6'}}>🧪</span> {player.potions}</div>
                    <div style={{ display:'flex', alignItems:'center', gap:'8px', color:'#facc15' }}>💰 {player.gold}</div>
                  </div>

                  {/* Equipment */}
                  <div style={{ fontSize:'10px', textTransform:'uppercase', fontWeight:'bold', color:'#9ca3af', display:'flex', flexDirection:'column', gap:'6px' }}>
                    <div>WEAPON: <span style={{ color: player.weapon ? "white" : "white" }}>{player.weapon ? player.weapon.name : 'NONE'}</span></div>
                    <div>ARMOR: <span style={{ color: player.armor ? "white" : "white" }}>{player.armor ? player.armor.name : 'NONE'}</span></div>
                    <div>NECK: <span style={{ color: player.necklace ? "white" : "white" }}>{player.necklace ? `${player.necklace.name}` : 'NONE'}</span></div>
                  </div>
                </div>

                {/* 3. Log Panel */}
                <div className="ui-panel custom-scroll scrollable" style={{ backgroundColor:'#000', padding:'12px', flex:1, minHeight:'120px', fontFamily:'sans-serif', fontSize:'13px', display:'flex', flexDirection:'column' }}>
                  {logs.length === 0 ? <p style={{ color:'#eab308', fontStyle:'italic' }}>Welcome! You chose {player.selectedTopics.length} Science topic(s). Answer wisely to power your ultimate!</p> : 
                    logs.map(log => <p key={log.id} style={{ color: log.color, marginBottom:'6px', wordBreak:'break-word', lineHeight:1.3 }}>{log.message}</p>)
                  }
                  <div ref={logEndRef} />
                </div>

                {/* 4. Controls Area (Radar + D-Pad) */}
                <div style={{ flexShrink:0, transition:'opacity 0.3s', paddingBottom:'8px', display:'flex', flexDirection:'row', alignItems:'flex-start', justifyContent:'space-between', opacity: (['EXPLORE', 'LOOT'].includes(gameState) && !activeMenu) ? 1 : 0.2, pointerEvents: (['EXPLORE', 'LOOT'].includes(gameState) && !activeMenu) ? 'auto' : 'none' }}>
                  
                  {/* Radar */}
                  <div style={{ width:'120px', display:'flex', flexDirection:'column', alignItems:'center' }}>
                    <span style={{ fontSize:'10px', color:'#9ca3af', marginBottom:'6px', letterSpacing:'1px', fontWeight:'bold' }}>RADAR</span>
                    {renderMiniMap()}
                  </div>

                  {/* D-PAD */}
                  <div className="d-pad-grid">
                    <div/>
                    <div onPointerDown={(e)=>{e.preventDefault(); move(0,-1);}} className="d-pad-btn"><ArrowUpIcon className="w-8 h-8"/></div>
                    <div/>
                    <div onPointerDown={(e)=>{e.preventDefault(); move(-1,0);}} className="d-pad-btn"><ArrowLeftIcon className="w-8 h-8"/></div>
                    <div className="d-pad-center"></div>
                    <div onPointerDown={(e)=>{e.preventDefault(); move(1,0);}} className="d-pad-btn"><ArrowRightIcon className="w-8 h-8"/></div>
                    <div/>
                    <div onPointerDown={(e)=>{e.preventDefault(); move(0,1);}} className="d-pad-btn"><ArrowDownIcon className="w-8 h-8"/></div>
                    <div/>
                  </div>

                </div>
              </div>
            </div>
          )}
        </div>
