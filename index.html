<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Retro Hero's Ascent: Science Edition</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;900&display=swap');

    body {
      margin: 0;
      padding: 0;
      background-color: #050b14; /* Deep navy background matching image */
      color: white;
      overflow: hidden;
      font-family: monospace;
      -webkit-text-size-adjust: 100%; 
      touch-action: none; -webkit-touch-callout: none;
      -webkit-user-select: none; user-select: none;
    }

    /* --- EXACT LAYOUT REPLICATION --- */
    .game-layout {
      display: flex; flex-direction: column; width: 100%; height: 100%;
      padding: 16px; gap: 16px; box-sizing: border-box; overflow: hidden;
    }

    /* Left Side: Map Viewport */
    .game-viewport {
      flex: 1 1 auto; 
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background-color: #000; 
      position: relative; overflow: hidden;
      border: 3px solid white; 
      min-width: 0; min-height: 0; 
    }

    /* Right Side: UI Sidebar */
    .game-sidebar {
      display: flex; flex-direction: column; gap: 12px; flex-shrink: 0; width: 100%; min-height: 0;
    }

    @media (min-width: 1024px) {
      .game-layout { 
        flex-direction: row; 
        padding: 32px; 
        gap: 24px; 
        justify-content: center; 
        align-items: stretch;
        max-width: 1400px; 
        margin: 0 auto; 
      }
      .game-viewport {
        flex: 1;
        aspect-ratio: 1 / 1;
        max-height: 100%;
      }
      .game-sidebar { width: 380px; height: 100%; }
    }

    /* --- FONTS & UI ELEMENTS --- */
    .pixel-font { font-family: 'Press Start 2P', monospace; letter-spacing: 1px; }
    
    .pixel-btn {
      padding: 0.75rem 1.5rem; border: 2px solid #fff;
      font-weight: bold; text-transform: uppercase; transition: all 0.1s; cursor: pointer;
    }
    .pixel-btn:active:not(:disabled) { transform: translateY(2px); }
    .pixel-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(100%); }
    
    .ui-panel { border: 3px solid #fff; }

    /* Custom D-PAD styling from image */
    .d-pad-grid {
      display: grid;
      grid-template-columns: 50px 50px 50px;
      grid-template-rows: 50px 50px 50px;
      gap: 6px;
      align-items: center;
      justify-items: center;
    }
    .d-pad-btn {
      background-color: #cbd5e1; /* Light gray */
      color: #0f172a;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 8px;
      border-bottom: 6px solid #64748b; /* Chunky bottom border */
      cursor: pointer;
      transition: all 0.05s;
    }
    .d-pad-btn:active {
      border-bottom-width: 2px;
      transform: translateY(4px);
    }
    .d-pad-center {
      background-color: #94a3b8;
      width: 100%;
      height: 100%;
      border-radius: 8px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .d-pad-center::after {
      content: '';
      width: 12px;
      height: 12px;
      background-color: #475569;
      border-radius: 50%;
    }

    /* Scrollbars */
    .custom-scroll::-webkit-scrollbar { width: 6px; }
    .custom-scroll::-webkit-scrollbar-track { background: #000; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }

    /* --- EFFECTS --- */
    @keyframes flashRed { 0%, 100% { background-color: transparent; } 50% { background-color: rgba(220, 38, 38, 0.5); } }
    .flash-red-screen { animation: flashRed 0.6s ease-out; }
    
    @keyframes flashGreen { 0%, 100% { border-color: #fff; } 50% { border-color: #22c55e; box-shadow: 0px 0px 20px 5px rgba(34, 197, 94, 0.8); } }
    .flash-green-panel { animation: flashGreen 1.0s; }

    /* --- TERRAIN TEXTURES (Matched to Screenshot) --- */
    .terrain-grass { background-color: #63d13e; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
    .terrain-forest { 
      background-color: #1e8c20; 
      background-image: radial-gradient(#156016 30%, transparent 30%); 
      background-size: 8px 8px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.2); 
    }
    .terrain-mountain { 
      background-color: #8b5a2b; 
      background-image: linear-gradient(45deg, #704822 25%, transparent 25%, transparent 75%, #704822 75%, #704822), linear-gradient(45deg, #704822 25%, transparent 25%, transparent 75%, #704822 75%, #704822);
      background-size: 16px 16px;
      background-position: 0 0, 8px 8px;
      box-shadow: inset 0 0 0 1px rgba(0,0,0,0.3);
    }
    .terrain-water { background-color: #3b82f6; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
    .terrain-path { background-color: #d1a569; box-shadow: inset 0 0 0 1px rgba(0,0,0,0.1); }
    .terrain-demon { background-color: #4a1010; }
    .terrain-lava { background-color: #ef4444; }
    .terrain-cave { background-color: #1f2937; }

    /* Loader */
    #sls-loader { position: fixed; inset: 0; background-color: #050b14; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fbbf24; font-family: 'Press Start 2P', monospace; z-index: 9999; }
    @keyframes fast-pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } }
    .loader-icon { font-size: 3rem; animation: fast-pulse 0.8s infinite; margin-bottom: 20px; }
  </style>

  <script>
    window.addEventListener('error', function(e) {
      var loader = document.getElementById('sls-loader');
      if (loader) loader.innerHTML = '<div style="color:#ef4444; text-align:center; padding:20px; line-height:1.5;"><b>Error Loading Game</b><br/><br/>The environment might be blocking local storage or scripts.<br/><br/><span style="font-size:10px;">' + e.message + '</span></div>';
    });
    setTimeout(function() {
      var loader = document.getElementById('sls-loader');
      if (loader && loader.style.display !== 'none' && loader.innerHTML.indexOf('Error') === -1) {
         loader.innerHTML += '<br/><br/><div style="font-size:10px; color:#9ca3af; text-align:center;">Compiling... please wait.</div>';
      }
    }, 3000);
  </script>
</head>
<body>
  
  <div id="sls-loader"><div class="loader-icon">⏳</div><div style="font-size: 12px; letter-spacing: 2px;">LOADING ENGINE...</div></div>
  <div id="root" style="position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; overflow: hidden;"></div>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useRef, useCallback } = React;

    class ErrorBoundary extends React.Component {
      constructor(props) { super(props); this.state = { hasError: false, error: null }; }
      static getDerivedStateFromError(error) { return { hasError: true, error }; }
      componentDidCatch(error, errorInfo) { console.error("Game Crashed:", error, errorInfo); }
      render() {
        if (this.state.hasError) {
          return (
            <div style={{ padding: '20px', color: 'white', backgroundColor: '#050b14', height: '100%', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', textAlign: 'center' }}>
              <h2 style={{ color: '#ef4444', fontSize: '24px', marginBottom: '16px', fontFamily: '"Press Start 2P", monospace' }}>SYSTEM ERROR</h2>
              <button onClick={() => { try { localStorage.removeItem('retroHeroSave'); } catch(e){} window.location.reload(); }} className="pixel-btn bg-red-600">CLEAR SAVE & RESTART</button>
            </div>
          );
        }
        return this.props.children;
      }
    }

    // --- ICONS ---
    const Volume2Icon = ({size, className, style}) => <svg className={className} style={style} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path d="M15.54 8.46a5 5 0 0 1 0 7.07"></path><path d="M19.07 4.93a10 10 0 0 1 0 14.14"></path></svg>;
    const VolumeXIcon = ({size, className, style}) => <svg className={className} style={style} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><line x1="23" y1="9" x2="17" y2="15"></line><line x1="17" y1="9" x2="23" y2="15"></line></svg>;
    const ArrowUpIcon = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m18 15-6-6-6 6"/></svg>;
    const ArrowDownIcon = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m6 9 6 6 6-6"/></svg>;
    const ArrowLeftIcon = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const ArrowRightIcon = ({className}) => <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;

    // --- AUDIO SYSTEM ---
    let audioCtx = null;
    let isMuted = false;

    const getAudioCtx = () => {
      try {
        if (typeof window === 'undefined') return null;
        if (!audioCtx) { const AudioContext = window.AudioContext || window.webkitAudioContext; if (AudioContext) audioCtx = new AudioContext(); }
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(() => {});
        return audioCtx;
      } catch (err) { return null; }
    };
    const toggleMute = () => { isMuted = !isMuted; return isMuted; };

    // --- QUESTION BANKS (Sample P3-P6 Science) ---
    const QUESTION_BANKS = {
      P3: {
        "Diversity": [
          { q: "Which of the following shows that living things respond to changes?", options: ["A millipede rolling up when touched.", "A young plant growing taller.", "A tiger eating meat."], correct: "A millipede rolling up when touched." },
          { q: "Which material is waterproof and best for making an umbrella?", options: ["Plastic", "Wood", "Cotton"], correct: "Plastic" }
        ]
      },
      P4: {
        "Cycles": [
          { q: "Which state of matter has a definite volume but no definite shape?", options: ["Liquid", "Solid", "Gas"], correct: "Liquid" }
        ]
      },
      P5: {
        "Systems": [
          { q: "What is the function of the 'nucleus' in a cell?", options: ["It controls all activities.", "It makes food.", "It gives shape."], correct: "It controls all activities." }
        ]
      },
      P6: {
        "Forces": [
          { q: "What is the definition of 'frictional force'?", options: ["A force that opposes motion.", "A pull exerted by the Earth.", "A magnetic force."], correct: "A force that opposes motion." }
        ]
      }
    };

    const MAP_SIZE = 35; 
    const CLASSES = { Warrior: { hp: 160, atk: 25, def: 20, color: '#2563eb', ultName: 'Omnislash' } };
    const EXP_REQUIREMENTS = [0, 50, 150, 300, 500, 800, 1200, 1800, 2500, 3500];

    const generateMap = () => {
      let map = Array(MAP_SIZE).fill(null).map(() => Array(MAP_SIZE).fill('.'));
      for (let y = 0; y < MAP_SIZE; y++) {
        for (let x = 0; x < MAP_SIZE; x++) {
          if (x === 0 || y === 0 || x === MAP_SIZE - 1 || y === MAP_SIZE - 1) { map[y][x] = '~'; continue; } 
          const r = Math.abs(Math.sin(x * 12.9898 + y * 78.233)) * 43758.5453 % 1;
          if (r < 0.15) map[y][x] = 'M'; else if (r < 0.35) map[y][x] = 'T'; else map[y][x] = '.'; 
        }
      }
      for (let x = 12; x <= 18; x++) map[15][x] = '.'; 
      for (let y = 12; y <= 18; y++) map[y][15] = '.'; 
      map[15][15] = 'O'; // Town
      return map;
    };

    const HeroSprite = ({ tunicColor = "#1d4ed8" }) => (
      <div className="animate-bounce z-10 flex items-center justify-center" style={{ width: '100%', height: '100%', filter: 'drop-shadow(0 4px 4px rgba(0,0,0,0.5))' }}>
        <svg viewBox="0 0 16 16" width="80%" height="80%" shapeRendering="crispEdges">
          <rect x="4" y="0" width="8" height="2" fill="#5c3a21" />
          <rect x="3" y="2" width="10" height="2" fill="#5c3a21" />
          <rect x="4" y="4" width="8" height="4" fill="#fcae7c" />
          <rect x="5" y="5" width="1" height="2" fill="#000" />
          <rect x="10" y="5" width="1" height="2" fill="#000" />
          <rect x="4" y="9" width="8" height="4" fill={tunicColor} />
          <rect x="3" y="15" width="4" height="1" fill="#4a2e1b" />
          <rect x="9" y="15" width="4" height="1" fill="#4a2e1b" />
        </svg>
      </div>
    );

    function App() {
      const [gameState, setGameState] = useState('EXPLORE'); 
      const [logs, setLogs] = useState([{id: 1, message: 'Welcome! You chose 3 Science topic(s). Answer wisely to power your ultimate!', color: '#facc15'}]);
      const [worldMap, setWorldMap] = useState(generateMap());
      const [playerPos, setPlayerPos] = useState({ x: 15, y: 15 });
      const posRef = useRef({ x: 15, y: 15 }); 
      
      const [player, setPlayer] = useState({
        name: 'HERO', charClass: 'Warrior', level: 1, exp: 0, gold: 50, potions: 3, 
        hp: 160, maxHp: 160, atk: 25, def: 20, weapon: null, armor: null, necklace: null, startTime: Date.now()
      });

      const [screenVfx, setScreenVfx] = useState(null); 
      const [, setForceRender] = useState(0);

      const addLog = (message, color = '#d1d5db') => setLogs(prev => [...prev.slice(-10), { id: Date.now() + Math.random(), message, color }]);

      const move = useCallback((dx, dy) => {
        if (gameState !== 'EXPLORE') return;
        const nx = ((posRef.current.x + dx) % MAP_SIZE + MAP_SIZE) % MAP_SIZE;
        const ny = ((posRef.current.y + dy) % MAP_SIZE + MAP_SIZE) % MAP_SIZE;
        const tile = worldMap[ny][nx];
        
        if (tile === 'M' || tile === '~') return; // Collision

        posRef.current = { x: nx, y: ny }; 
        setPlayerPos({ x: nx, y: ny });

        if (tile === 'O') { addLog("Entered Sanctuary Town.", "#facc15"); } 
      }, [gameState, worldMap]);

      useEffect(() => {
        const handleKeyDown = (e) => {
          if (gameState !== 'EXPLORE') return;
          switch(e.key) {
            case 'ArrowUp': case 'w': move(0, -1); break;
            case 'ArrowDown': case 's': move(0, 1); break;
            case 'ArrowLeft': case 'a': move(-1, 0); break;
            case 'ArrowRight': case 'd': move(1, 0); break;
            default: break;
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [gameState, move]);

      // --- RENDER MAP TILES (Viewport) ---
      const renderMapTiles = () => {
        const tiles = [];
        const viewDist = 4; // 9x9 grid
        for (let y = playerPos.y - viewDist; y <= playerPos.y + viewDist; y++) {
          for (let x = playerPos.x - viewDist; x <= playerPos.x + viewDist; x++) {
            let wrappedX = ((x % MAP_SIZE) + MAP_SIZE) % MAP_SIZE;
            let wrappedY = ((y % MAP_SIZE) + MAP_SIZE) % MAP_SIZE;
            let tile = worldMap[wrappedY][wrappedX];
            
            let bg = 'bg-black';
            if (tile === '.') bg = 'terrain-grass';
            else if (tile === 'T') bg = 'terrain-forest';
            else if (tile === 'M') bg = 'terrain-mountain';
            else if (tile === 'O') bg = 'terrain-path'; 
            else if (tile === '~') bg = 'terrain-water';

            const isHero = (x === playerPos.x && y === playerPos.y);
            const icon = isHero ? <HeroSprite tunicColor={CLASSES[player.charClass]?.color} /> : null;
            
            tiles.push(
              <div key={`${x}-${y}`} className={`${bg}`} style={{ width:'11.1111%', height:'11.1111%', display:'flex', alignItems:'center', justifyContent:'center' }}>
                {icon}
              </div>
            );
          }
        }
        return tiles;
      };

      // --- RENDER MINI-MAP (Radar) ---
      const renderMiniMap = () => {
        return (
          <div style={{ backgroundColor:'#0f172a', padding:'2px', display: 'flex', flexWrap:'wrap', width: '100%', height: '100px', border: '2px solid #475569', boxSizing:'border-box' }}>
            {worldMap.map((row, y) => row.map((tile, x) => {
              let bg = '#1f2937';
              if (x === playerPos.x && y === playerPos.y) bg = '#ffffff'; 
              else if (tile === '.') bg = '#22c55e';
              else if (tile === 'T') bg = '#166534';
              else if (tile === 'M') bg = '#78350f';
              else if (tile === '~') bg = '#3b82f6';
              else if (tile === 'O') bg = '#eab308';
              return <div key={`${x}-${y}`} style={{ backgroundColor: bg, width: `${100/MAP_SIZE}%`, height: `${100/MAP_SIZE}%` }} />
            }))}
          </div>
        )
      };

      const getPlayTime = () => {
        const secs = Math.floor((Date.now() - player.startTime) / 1000);
        return `${Math.floor(secs/60)}m ${secs%60}s`;
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', width: '100%', height: '100%', position: 'relative' }}>
          {/* Mute Button */}
          <button onClick={() => { setIsAudioMuted(toggleMute()); setForceRender(Math.random()); }} style={{ position:'absolute', top:'12px', left:'12px', zIndex:100, backgroundColor:'rgba(0,0,0,0.8)', padding:'8px', borderRadius:'50%', border:'2px solid #475569' }}>
            {isMuted ? <VolumeXIcon size={20} className="text-red-500"/> : <Volume2Icon size={20} className="text-green-500"/>}
          </button>

          <div className="game-layout">
            
            {/* LEFT: Game Viewport */}
            <div className={`game-viewport ${screenVfx==='flash-red'?'flash-red-screen':''}`}>
              <div style={{ width: '100%', height: '100%', display: 'flex', flexWrap: 'wrap', alignContent: 'flex-start' }}>
                {renderMapTiles()}
              </div>
            </div>

            {/* RIGHT: UI Sidebar */}
            <div className="game-sidebar">
              
              {/* Top Buttons Row */}
              <div style={{ display:'flex', gap:'8px', flexShrink:0 }}>
                <button className="pixel-font" style={{ flex:1, backgroundColor:'#9333ea', color:'white', border:'2px solid white', padding:'8px', fontSize:'12px' }}>🎒 MENU</button>
                <button className="pixel-font" style={{ flex:1, backgroundColor:'#2563eb', color:'white', border:'2px solid white', padding:'8px', fontSize:'12px' }}>💾 SAVE</button>
                <div className="pixel-font" style={{ flex:1, backgroundColor:'black', color:'#facc15', border:'2px solid #475569', padding:'8px', fontSize:'10px', display:'flex', alignItems:'center', justifyContent:'center' }}>
                  ⏱️ {getPlayTime()}
                </div>
              </div>

              {/* Stats Panel */}
              <div className={`ui-panel ${screenVfx==='flash-green'?'flash-green-panel':''}`} style={{ backgroundColor:'#0f172a', padding:'16px', flexShrink:0 }}>
                {/* Header */}
                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-end', borderBottom:'2px solid #1e3a8a', paddingBottom:'8px', marginBottom:'16px' }}>
                  <h3 className="pixel-font" style={{ fontSize:'16px', color:'#fde047' }}>{player.name}</h3>
                  <span className="pixel-font" style={{ fontSize:'12px' }}>LV {player.level}</span>
                </div>
                
                {/* Bars */}
                <div style={{ marginBottom:'12px' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:'12px', fontWeight:'bold', marginBottom:'4px' }}><span>HP</span> <span>{player.hp}/{player.maxHp}</span></div>
                  <div style={{ width:'100%', backgroundColor:'#1e293b', height:'12px' }}>
                    <div style={{ backgroundColor:'#ef4444', height:'100%', width: `${(player.hp/player.maxHp)*100}%` }}></div>
                  </div>
                </div>
                
                <div style={{ marginBottom:'20px' }}>
                  <div style={{ display:'flex', justifyContent:'space-between', fontSize:'12px', fontWeight:'bold', marginBottom:'4px' }}><span>EXP</span> <span>{player.exp}/{EXP_REQUIREMENTS[player.level]}</span></div>
                  <div style={{ width:'100%', backgroundColor:'#1e293b', height:'12px' }}>
